<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Monitor</title>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Resource Monitor</h1>
      <span id="update-time">--:--:--</span>
    </header>

    <div class="content">
      <div class="left-panel">
        <div class="metric-card">
          <h2 class="card-title">CPU</h2>
          <div class="metric-value" id="cpu-value">0%</div>
          <div class="chart-container" id="cpu-chart"></div>
        </div>

        <div class="metric-card">
          <h2 class="card-title">RAM</h2>
          <div class="metric-value" id="ram-value">0 / 0 MB</div>
          <div class="chart-container" id="ram-chart"></div>
        </div>

        <div class="metric-card">
          <h2 class="card-title">Disk</h2>
          <div class="disk-stats">
            <div class="info-row">
              <span class="label">Read:</span>
              <span class="value accent-purple" id="disk-read">0 MB/s</span>
            </div>
            <div class="info-row">
              <span class="label">Write:</span>
              <span class="value accent-pink" id="disk-write">0 MB/s</span>
            </div>
            <div class="info-row">
              <span class="label">I/O util:</span>
              <span class="value" id="disk-io">0%</span>
            </div>
          </div>
          <div class="chart-container" id="disk-chart"></div>
        </div>

        <div class="metric-card">
          <h2 class="card-title">System</h2>
          <div class="info-row">
            <span class="label">Total processes:</span>
            <span class="value" id="process-count">0</span>
          </div>
          <div class="info-row">
            <span class="label">Total RAM:</span>
            <span class="value" id="ram-total">0 MB</span>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="process-card">
          <h2 class="card-title">Processes</h2>
          <input
            type="text"
            id="process-filter"
            placeholder="Filter by name..."
            class="filter-input"
          >
          <div class="table-wrapper">
            <table class="process-table">
              <thead>
                <tr>
                  <th data-sort="pid">PID</th>
                  <th data-sort="name">Name</th>
                  <th data-sort="user">User</th>
                  <th data-sort="state">State</th>
                </tr>
              </thead>
              <tbody id="process-list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
